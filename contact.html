<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <section>
        <h2>We'd love to hear from you!</h2>
        <form action="/submit-inquiry" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </section>
    <section>
        <h2>Contact Information</h2>
        <p>Email us at: <a href="mailto:info@example.com">info@example.com</a></p>
        <h3>Follow us:</h3>
        <ul>
            <li><a href="https://facebook.com/yourpage">Facebook</a></li>
            <li><a href="https://twitter.com/yourpage">Twitter</a></li>
            <li><a href="https://instagram.com/yourpage">Instagram</a></li>
        </ul>
    </section>
</body>
</html>
